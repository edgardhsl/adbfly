name: docs

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt

      - name: Build docs (strict)
        run: mkdocs build --strict

      - name: Install lychee
        run: |
          curl -sSfL https://github.com/lycheeverse/lychee/releases/download/lychee-v0.23.0/lychee-x86_64-unknown-linux-gnu.tar.gz -o lychee.tar.gz
          tar -xzf lychee.tar.gz
          sudo mv lychee /usr/local/bin/lychee
          lychee --version

      - name: Check markdown links
        run: |
          mapfile -t md_files < <(git ls-files "docs/*.md" "docs/**/*.md")
          if [ "${#md_files[@]}" -eq 0 ]; then
            echo "No markdown files found in docs/"
            exit 1
          fi
          lychee --no-progress --verbose --mode path "${md_files[@]}"

      - name: Check generated site links
        run: |
          mapfile -t html_files < <(find site -type f -name "*.html")
          if [ "${#html_files[@]}" -eq 0 ]; then
            echo "No generated html files found in site/"
            exit 1
          fi
          lychee --no-progress --verbose --mode path "${html_files[@]}"

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write
      contents: read

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt

      - name: Build docs
        run: mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
